openapi: 3.0.3
info:
  title: API del challenge Qisur
  version: 1.0.0
  description: |
    REST API + WebSockets para el challenge de Qisur.

    ## WebSocket

    Conectarse en `ws://<host>/ws?token=<jwt>`

    Si el token es inválido, el servidor cierra la conexión con código `4001`.

    ### Eventos recibidos por el cliente
    ```json
    { "event": "product:created",  "data": { ...product } }
    { "event": "product:updated",  "data": { ...product } }
    { "event": "product:deleted",  "data": { "id": 1 } }
    { "event": "category:created", "data": { ...category } }
    { "event": "category:updated", "data": { ...category } }
    { "event": "category:deleted", "data": { "id": 1 } }
    ```

servers:
  - url: http://localhost:3000/api

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id: { type: integer }
        email: { type: string, format: email }
        role: { type: string, enum: [ADMIN, CLIENT, VIEWER] }

    AuthResponse:
      type: object
      properties:
        token: { type: string }
        user: { $ref: '#/components/schemas/User' }

    Category:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    Product:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string, nullable: true }
        price: { type: number, format: float }
        stock: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        categories: { type: array, items: { $ref: '#/components/schemas/Category' } }

    ProductHistory:
      type: object
      properties:
        id: { type: integer }
        productId: { type: integer }
        price: { type: number, format: float }
        stock: { type: integer }
        changedAt: { type: string, format: date-time }

    PaginatedProducts:
      type: object
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Product' } }
        meta:
          type: object
          properties:
            total: { type: integer }
            page: { type: integer }
            limit: { type: integer }
            pages: { type: integer }

    ValidationError:
      type: object
      properties:
        error: { type: string }
        details: { type: object }

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Registrar un nuevo usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 6 }
                role: { type: string, enum: [ADMIN, CLIENT, VIEWER] }
      responses:
        '201':
          description: Usuario creado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '400':
          description: Error de validación
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ValidationError' }
        '409': { description: Correo electrónico ya registrado }

  /auth/login:
    post:
      tags: [Auth]
      summary: Iniciar sesión y recibir un JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: Inicio de sesión exitoso
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '400': { description: Error de validación }
        '401': { description: Credenciales inválidas }

  /products:
    get:
      tags: [Products]
      summary: Listar productos (paginado)
      parameters:
        - { name: name, in: query, schema: { type: string } }
        - { name: minPrice, in: query, schema: { type: number } }
        - { name: maxPrice, in: query, schema: { type: number } }
        - { name: categoryId, in: query, schema: { type: integer } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: limit, in: query, schema: { type: integer, default: 10 } }
        - {
            name: sortBy,
            in: query,
            schema: { type: string, enum: [name, price, stock, createdAt] },
          }
        - { name: order, in: query, schema: { type: string, enum: [asc, desc] } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedProducts' }

    post:
      tags: [Products]
      summary: Crear un producto (ADMIN)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, price, stock]
              properties:
                name: { type: string }
                description: { type: string }
                price: { type: number }
                stock: { type: integer }
                categoryIds: { type: array, items: { type: integer } }
      responses:
        '201':
          description: Creado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '400': { description: Error de validación }
        '401': { description: No autorizado }
        '403': { description: Prohibido }

  /products/{id}:
    get:
      tags: [Products]
      summary: Obtener producto por id
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '404': { description: No encontrado }

    put:
      tags: [Products]
      summary: Actualizar producto (ADMIN)
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string }
                price: { type: number }
                stock: { type: integer }
                categoryIds: { type: array, items: { type: integer } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '400': { description: Error de validación }
        '401': { description: No autorizado }
        '403': { description: Prohibido }
        '404': { description: No encontrado }

    delete:
      tags: [Products]
      summary: Eliminar producto (ADMIN)
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200': { description: Eliminado }
        '401': { description: No autorizado }
        '403': { description: Prohibido }
        '404': { description: No encontrado }

  /products/{id}/history:
    get:
      tags: [Products]
      summary: Obtener historial de precio/stock de un producto
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
        - {
            name: start,
            in: query,
            schema: { type: string, format: date-time },
            description: ISO 8601 start date,
          }
        - {
            name: end,
            in: query,
            schema: { type: string, format: date-time },
            description: ISO 8601 end date,
          }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ProductHistory' }
        '404': { description: No encontrado }

  /categories:
    get:
      tags: [Categories]
      summary: Listar todas las categorías
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Category' }

    post:
      tags: [Categories]
      summary: Crear una categoría (ADMIN)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: string }
      responses:
        '201':
          description: Creado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Category' }
        '400': { description: Error de validación }
        '401': { description: No autorizado }
        '403': { description: Prohibido }
        '409': { description: Nombre ya existe }

  /categories/{id}:
    put:
      tags: [Categories]
      summary: Actualizar una categoría (ADMIN)
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Category' }
        '400': { description: Error de validación }
        '401': { description: No autorizado }
        '403': { description: Prohibido }
        '404': { description: No encontrado }

    delete:
      tags: [Categories]
      summary: Eliminar una categoría (ADMIN)
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200': { description: Eliminado }
        '401': { description: No autorizado }
        '403': { description: Prohibido }
        '404': { description: No encontrado }

  /search:
    get:
      tags: [Search]
      summary: Buscar productos o categorías
      parameters:
        - {
            name: type,
            in: query,
            required: true,
            schema: { type: string, enum: [product, category] },
          }
        - { name: name, in: query, schema: { type: string } }
        - { name: minPrice, in: query, schema: { type: number } }
        - { name: maxPrice, in: query, schema: { type: number } }
        - { name: categoryId, in: query, schema: { type: integer } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: limit, in: query, schema: { type: integer, default: 10 } }
        - {
            name: sortBy,
            in: query,
            schema: { type: string, enum: [name, price, stock, createdAt] },
          }
        - { name: order, in: query, schema: { type: string, enum: [asc, desc] } }
      responses:
        '200':
          description: OK — devuelve PaginatedProducts cuando type=product, Category[] cuando type=category
          content:
            application/json:
              schema: {}
        '400': { description: Tipo inválido o ausente }
